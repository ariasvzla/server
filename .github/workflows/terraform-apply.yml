name: Terraform Apply (Production)

on:
  push:
    branches:
      - main
    paths:
      - 'Templates/**'

permissions:
  contents: read
  deployments: write

jobs:
  plan-apply:
    name: Plan and Apply Terraform
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.0

      - name: Terraform Init
        run: terraform init
        working-directory: Templates

      - name: Terraform Validate
        run: terraform validate
        working-directory: Templates

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        working-directory: Templates
        env:
          TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_node: ${{ secrets.PROXMOX_NODE }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: Templates
        env:
          TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_node: ${{ secrets.PROXMOX_NODE }}

      - name: Get Outputs
        id: outputs
        run: |
          terraform output cluster_info > /tmp/cluster_info.txt 2>/dev/null || echo "Cluster info not available"
          cat /tmp/cluster_info.txt
        working-directory: Templates
        continue-on-error: true

      - name: Create Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Kubernetes cluster deployed successfully'
            });
